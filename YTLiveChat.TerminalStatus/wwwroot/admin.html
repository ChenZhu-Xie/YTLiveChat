<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Admin - Update Status</title>
    <style>
        @font-face {
            font-family: 'Inconsolata';
            src: url('./Inconsolata-LXGWMono-Medium.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1b26; /* Tokyo Night dark */
            font-family: 'Inconsolata', monospace;
            color: #c0caf5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #24283b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #414868;
        }

        .title-input {
            background: linear-gradient(to right, #4a95e3, #c16781);
            -webkit-background-clip: text;
            background-clip: text;
            /* 关键：直接使用 color 而不是 text-fill-color，或者确保 caret-color 优先级最高 */
            color: transparent; 
            caret-color: #4a95e3 !important; 
            border: 1px solid #414868;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
            margin-left: 10px;
            flex-grow: 1;
            font-weight: bold;
            font-size: 18px;
            outline: none;
        }

        .editor-container {
            flex-grow: 1;
            margin: 20px;
            position: relative;
            background: #1a1b26;
            border: 1px solid #414868;
            border-radius: 8px;
            overflow: hidden;
        }

        #backdrop, #statusInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            margin: 0;
            border: none;
            font-family: 'Inconsolata', monospace;
            font-size: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-all;
            box-sizing: border-box;
            background: transparent;
            /* 确保对齐：消除不同浏览器的默认平滑差异 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
        }

        #statusInput {
            color: transparent !important; /* 强制透明，让背景层显现 */
            -webkit-text-fill-color: transparent !important;
            caret-color: #9ece6a;
            outline: none;
            resize: none;
            z-index: 2;
        }

        #backdrop {
            color: #9ece6a;
            z-index: 1;
            pointer-events: none;
            overflow-y: hidden; /* Scrolled via textarea */
        }

        .status-info {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: #565f89;
            z-index: 10;
            background: rgba(26, 27, 38, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
        }

        label { font-size: 14px; color: #565f89; }
    </style>
</head>
<body>
    <div class="header">
        <label>TITLE:</label>
        <input type="text" id="titleInput" class="title-input" placeholder="KanBan 看板" value="KanBan 看板">
    </div>
    <div class="editor-container">
        <div id="backdrop"></div>
        <textarea id="statusInput" placeholder="Type status message here..."></textarea>
        <div class="status-info">SIGNALR: <span id="syncStatus">DISCONNECTED</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/statusHub")
            .withAutomaticReconnect()
            .build();

        const statusInput = document.getElementById("statusInput");
        const backdrop = document.getElementById("backdrop");
        const titleInput = document.getElementById("titleInput");
        const syncStatus = document.getElementById("syncStatus");

        const colors = [
            '#7aa2f7', // blue
            '#bb9af7', // purple
            '#7dcfff', // cyan
            '#e0af68', // yellow
            '#f7768e', // red
            '#9ece6a', // green
            '#b4f9f8', // aqua
            '#ff9e64'  // orange
        ];

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderColoredContent(message) {
            const msg = message || "";
            let resultHtml = "";
            let currentLineIndex = 0;
            
            const startSpan = (idx) => `<span style="color: ${colors[idx % colors.length]}">`;
            
            resultHtml += startSpan(currentLineIndex);
            
            for (let i = 0; i < msg.length; i++) {
                const char = msg[i];
                if (char === '\n') {
                    resultHtml += `</span>\n`;
                    currentLineIndex++;
                    resultHtml += startSpan(currentLineIndex);
                } else {
                    resultHtml += escapeHtml(char);
                }
            }
            
            resultHtml += `</span>`;
            return resultHtml;
        }

        function updateBackdrop() {
            backdrop.innerHTML = renderColoredContent(statusInput.value) + (statusInput.value.endsWith('\n') ? '<br>&nbsp;' : '');
        }

        async function start() {
            try {
                await connection.start();
                syncStatus.innerText = "CONNECTED";
                syncStatus.style.color = "#9ece6a";
                // Initial sync after connection
                sync();
            } catch (err) {
                console.error(err);
                setTimeout(start, 5000);
            }
        };

        connection.onclose(() => {
            syncStatus.innerText = "DISCONNECTED";
            syncStatus.style.color = "#f7768e";
        });

        function sync() {
            updateBackdrop();
            connection.invoke("UpdateStatus", statusInput.value, statusInput.selectionStart)
                .catch(err => console.error(err));
        }

        statusInput.addEventListener("input", sync);
        statusInput.addEventListener("keyup", sync);
        statusInput.addEventListener("click", sync);
        statusInput.addEventListener("scroll", () => {
            backdrop.scrollTop = statusInput.scrollTop;
        });

        titleInput.addEventListener("input", () => {
            connection.invoke("UpdateTitle", titleInput.value).catch(err => console.error(err));
        });

        // Initialize values from server
        connection.on("ReceiveStatus", (message, cursorPosition) => {
            if (document.activeElement !== statusInput) {
                statusInput.value = message;
                statusInput.selectionStart = statusInput.selectionEnd = cursorPosition;
                updateBackdrop();
            }
        });

        connection.on("ReceiveTitle", (title) => {
            if (document.activeElement !== titleInput) {
                titleInput.value = title;
            }
        });

        start();
    </script>
</body>
</html>
