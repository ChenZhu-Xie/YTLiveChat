<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Admin - Update Status</title>
    <style>
        @font-face {
            font-family: 'Inconsolata';
            src: url('./Inconsolata-LXGWMono-Medium.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1b26; /* Tokyo Night dark */
            font-family: 'Inconsolata', monospace;
            color: #c0caf5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #24283b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #414868;
        }

        .title-input {
            background: linear-gradient(to right, #4a95e3, #c16781);
            -webkit-background-clip: text;
            background-clip: text;
            /* 关键：直接使用 color 而不是 text-fill-color，或者确保 caret-color 优先级最高 */
            color: transparent; 
            caret-color: #4a95e3 !important; 
            border: 1px solid #414868;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
            margin-left: 10px;
            flex-grow: 1;
            font-weight: bold;
            font-size: 18px;
            outline: none;
        }

        .editor-container {
            flex-grow: 1;
            margin: 20px;
            position: relative;
            background: #1a1b26;
            border: 1px solid #414868;
            border-radius: 8px;
            overflow: hidden;
        }

        #backdrop, #statusInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            margin: 0;
            border: none;
            font-family: 'Inconsolata', monospace;
            font-size: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-all;
            box-sizing: border-box;
            background: transparent;
            /* 确保对齐：消除不同浏览器的默认平滑差异 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
        }

        #statusInput {
            color: transparent !important; /* 强制透明，让背景层显现 */
            -webkit-text-fill-color: transparent !important;
            caret-color: #9ece6a;
            outline: none;
            resize: none;
            z-index: 2;
        }

        #backdrop {
            color: #9ece6a;
            z-index: 1;
            pointer-events: none;
            overflow-y: hidden; /* Scrolled via textarea */
        }

        .status-info {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: #565f89;
            z-index: 10;
            background: rgba(26, 27, 38, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
        }

        label { font-size: 14px; color: #565f89; }
    </style>
</head>
<body>
    <div class="header">
        <label>TITLE:</label>
        <input type="text" id="titleInput" class="title-input" placeholder="KanBan 看板" value="KanBan 看板">
    </div>
    <div class="editor-container">
        <div id="backdrop"></div>
        <textarea id="statusInput" placeholder="Type status message here..."></textarea>
        <div class="status-info">SIGNALR: <span id="syncStatus">DISCONNECTED</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        const statusInput = document.getElementById("statusInput");
        const backdrop = document.getElementById("backdrop");
        const titleInput = document.getElementById("titleInput");
        const syncStatus = document.getElementById("syncStatus");
        const draftStorageKey = "ytlivechat-terminalstatus-draft";
        const lockStorageKey = "ytlivechat-terminalstatus-editor-lock";
        const tabId = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        const lockDurationMs = 4000;
        let hasReceivedInitialStatus = false;
        let hasReceivedInitialTitle = false;
        let isApplyingRemoteState = false;
        let lockRenewTimer = null;
        let connection = null;
        let lastSentStatus = "";
        let lastSentCursorPosition = 0;

        const colors = [
            '#7aa2f7', // blue
            '#bb9af7', // purple
            '#7dcfff', // cyan
            '#e0af68', // yellow
            '#f7768e', // red
            '#9ece6a', // green
            '#b4f9f8', // aqua
            '#ff9e64'  // orange
        ];

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderColoredContent(message) {
            const msg = message || "";
            let resultHtml = "";
            let currentLineIndex = 0;
            
            const startSpan = (idx) => `<span style="color: ${colors[idx % colors.length]}">`;
            
            resultHtml += startSpan(currentLineIndex);
            
            for (let i = 0; i < msg.length; i++) {
                const char = msg[i];
                if (char === '\n') {
                    resultHtml += `</span>\n`;
                    currentLineIndex++;
                    resultHtml += startSpan(currentLineIndex);
                } else {
                    resultHtml += escapeHtml(char);
                }
            }
            
            resultHtml += `</span>`;
            return resultHtml;
        }

        function updateBackdrop() {
            backdrop.innerHTML = renderColoredContent(statusInput.value) + (statusInput.value.endsWith('\n') ? '<br>&nbsp;' : '');
        }

        function applyState(state) {
            if (!state) {
                return;
            }

            isApplyingRemoteState = true;

            if (typeof state.title === "string") {
                titleInput.value = state.title;
                hasReceivedInitialTitle = true;
            }

            if (typeof state.status === "string") {
                const shouldPreserveSelection = document.activeElement === statusInput && hasReceivedInitialStatus;
                const selectionStart = statusInput.selectionStart ?? 0;
                const selectionEnd = statusInput.selectionEnd ?? selectionStart;

                statusInput.value = state.status;
                const cursorPosition = Number.isInteger(state.cursorPosition)
                    ? Math.max(0, Math.min(state.cursorPosition, statusInput.value.length))
                    : statusInput.value.length;

                if (shouldPreserveSelection) {
                    statusInput.selectionStart = Math.max(0, Math.min(selectionStart, statusInput.value.length));
                    statusInput.selectionEnd = Math.max(0, Math.min(selectionEnd, statusInput.value.length));
                } else {
                    statusInput.selectionStart = statusInput.selectionEnd = cursorPosition;
                }

                hasReceivedInitialStatus = true;
                updateBackdrop();
            }

            saveDraftToLocal();
            isApplyingRemoteState = false;
        }

        function saveDraftToLocal() {
            const draft = {
                status: statusInput.value,
                cursorPosition: statusInput.selectionStart ?? 0,
                title: titleInput.value,
                updatedAt: Date.now()
            };
            localStorage.setItem(draftStorageKey, JSON.stringify(draft));
        }

        function loadDraftFromLocal() {
            try {
                const raw = localStorage.getItem(draftStorageKey);
                if (!raw) return;

                const draft = JSON.parse(raw);
                if (typeof draft.status === "string") {
                    statusInput.value = draft.status;
                }
                if (typeof draft.title === "string" && draft.title.length > 0) {
                    titleInput.value = draft.title;
                }

                const cursorPosition = Number.isInteger(draft.cursorPosition)
                    ? Math.max(0, Math.min(draft.cursorPosition, statusInput.value.length))
                    : statusInput.value.length;

                statusInput.selectionStart = statusInput.selectionEnd = cursorPosition;
                updateBackdrop();
            } catch (err) {
                console.error("Failed to load local draft", err);
            }
        }

        function getLock() {
            try {
                const raw = localStorage.getItem(lockStorageKey);
                if (!raw) return null;

                const lock = JSON.parse(raw);
                if (!lock?.tabId || !lock?.expiresAt) return null;
                if (lock.expiresAt <= Date.now()) return null;
                return lock;
            } catch {
                return null;
            }
        }

        function applyLockUi() {
            const lock = getLock();
            const isOwnedByAnotherTab = lock && lock.tabId !== tabId;
            const isConnected = connection?.state === "Connected";

            statusInput.readOnly = Boolean(isOwnedByAnotherTab);
            titleInput.readOnly = Boolean(isOwnedByAnotherTab);
            syncStatus.innerText = isOwnedByAnotherTab ? "LOCKED" : (isConnected ? "CONNECTED" : "OFFLINE");
            syncStatus.style.color = isOwnedByAnotherTab ? "#e0af68" : (isConnected ? "#9ece6a" : "#f7768e");
        }

        function acquireLock() {
            const existingLock = getLock();
            if (existingLock && existingLock.tabId !== tabId) {
                applyLockUi();
                return false;
            }

            localStorage.setItem(lockStorageKey, JSON.stringify({
                tabId,
                expiresAt: Date.now() + lockDurationMs
            }));
            applyLockUi();
            return true;
        }

        function renewLock() {
            const existingLock = getLock();
            if (!existingLock || existingLock.tabId === tabId) {
                acquireLock();
            }
        }

        function releaseLock() {
            const existingLock = getLock();
            if (existingLock?.tabId === tabId) {
                localStorage.removeItem(lockStorageKey);
            }
            applyLockUi();
        }

        function startLockRenewal() {
            if (lockRenewTimer !== null) return;
            lockRenewTimer = setInterval(renewLock, Math.max(1000, Math.floor(lockDurationMs / 2)));
        }

        function stopLockRenewal() {
            if (lockRenewTimer !== null) {
                clearInterval(lockRenewTimer);
                lockRenewTimer = null;
            }
        }

        async function start() {
            try {
                const response = await fetch("/api/status", { cache: "no-store" });
                if (response.ok) {
                    applyState(await response.json());
                }

                if (!window.signalR) {
                    console.warn("SignalR client script was not loaded. Initial state is available, but realtime sync is disabled.");
                    applyLockUi();
                    return;
                }

                connection = new signalR.HubConnectionBuilder()
                    .withUrl("/statusHub")
                    .withAutomaticReconnect()
                    .build();

                connection.onclose(() => {
                    applyLockUi();
                });

                connection.on("ReceiveStatus", (message, cursorPosition) => {
                    applyState({
                        title: titleInput.value,
                        status: message,
                        cursorPosition
                    });
                });

                connection.on("ReceiveTitle", (title) => {
                    applyState({
                        title,
                        status: statusInput.value,
                        cursorPosition: statusInput.selectionStart ?? 0
                    });
                });

                await connection.start();
                applyLockUi();
            } catch (err) {
                console.error(err);
                setTimeout(start, 5000);
            }
        };

        function sync() {
            if (isApplyingRemoteState || !hasReceivedInitialStatus || statusInput.readOnly) {
                saveDraftToLocal();
                return;
            }

            saveDraftToLocal();
            updateBackdrop();
            lastSentStatus = statusInput.value;
            lastSentCursorPosition = statusInput.selectionStart ?? 0;
            if (!connection || connection.state !== "Connected") {
                return;
            }

            connection.invoke("UpdateStatus", lastSentStatus, lastSentCursorPosition)
                .catch(err => console.error(err));
        }

        function saveSelectionOnly() {
            if (isApplyingRemoteState || statusInput.readOnly) {
                return;
            }

            saveDraftToLocal();
            updateBackdrop();
        }

        statusInput.addEventListener("input", sync);
        statusInput.addEventListener("keyup", saveSelectionOnly);
        statusInput.addEventListener("click", saveSelectionOnly);
        statusInput.addEventListener("select", saveSelectionOnly);
        statusInput.addEventListener("mouseup", saveSelectionOnly);
        statusInput.addEventListener("scroll", () => {
            backdrop.scrollTop = statusInput.scrollTop;
        });

        titleInput.addEventListener("input", () => {
            if (titleInput.readOnly) {
                return;
            }

            saveDraftToLocal();
            if (connection && connection.state === "Connected") {
                connection.invoke("UpdateTitle", titleInput.value).catch(err => console.error(err));
            }
        });

        statusInput.addEventListener("focus", () => {
            if (acquireLock()) {
                startLockRenewal();
            }
        });

        titleInput.addEventListener("focus", () => {
            if (acquireLock()) {
                startLockRenewal();
            }
        });

        statusInput.addEventListener("blur", () => {
            stopLockRenewal();
            releaseLock();
        });

        titleInput.addEventListener("blur", () => {
            stopLockRenewal();
            releaseLock();
        });

        window.addEventListener("storage", (event) => {
            if (event.key === draftStorageKey && event.newValue && document.activeElement !== statusInput && document.activeElement !== titleInput) {
                loadDraftFromLocal();
            }

            if (event.key === lockStorageKey) {
                applyLockUi();
            }
        });

        window.addEventListener("beforeunload", () => {
            saveDraftToLocal();
            stopLockRenewal();
            releaseLock();
        });

        loadDraftFromLocal();
        applyLockUi();
        start();
    </script>
</body>
</html>
