<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Admin - Update Status</title>
    <style>
        @font-face {
            font-family: 'Inconsolata';
            src: url('./Inconsolata-LXGWMono-Medium.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1b26; /* Tokyo Night dark */
            font-family: 'Inconsolata', monospace;
            color: #c0caf5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #24283b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #414868;
        }

        .title-input {
            background: linear-gradient(to right, #4a95e3, #c16781);
            -webkit-background-clip: text;
            background-clip: text;
            /* 关键：直接使用 color 而不是 text-fill-color，或者确保 caret-color 优先级最高 */
            color: transparent; 
            caret-color: #4a95e3 !important; 
            border: 1px solid #414868;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
            margin-left: 10px;
            flex-grow: 1;
            font-weight: bold;
            font-size: 18px;
            outline: none;
        }

        .title-shell {
            position: relative;
            margin-left: 10px;
            flex-grow: 1;
            border: 1px solid #414868;
            border-radius: 4px;
            overflow: hidden;
        }

        .title-backdrop,
        .title-input {
            width: 100%;
            padding: 5px 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-weight: bold;
            font-size: 18px;
            line-height: 1.4;
        }

        .title-backdrop {
            position: absolute;
            inset: 0;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            text-overflow: clip;
            background: linear-gradient(90deg, #4a95e3 0%, #7aa2f7 35%, #bb9af7 68%, #c16781 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title-input {
            position: relative;
            background: transparent;
            color: transparent;
            -webkit-text-fill-color: transparent;
            caret-color: #4a95e3 !important;
            border: none;
            border-radius: 0;
            margin-left: 0;
            flex-grow: 0;
            outline: none;
        }

        .editor-container {
            flex-grow: 1;
            margin: 20px;
            position: relative;
            background: #1a1b26;
            border: 1px solid #414868;
            border-radius: 8px;
            overflow: hidden;
        }

        #backdrop, #statusInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            margin: 0;
            border: none;
            font-family: 'Inconsolata', monospace;
            font-size: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-all;
            box-sizing: border-box;
            background: transparent;
            /* 确保对齐：消除不同浏览器的默认平滑差异 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
        }

        #statusInput {
            color: transparent !important; /* 强制透明，让背景层显现 */
            -webkit-text-fill-color: transparent !important;
            caret-color: #9ece6a;
            outline: none;
            resize: none;
            z-index: 2;
        }

        #backdrop {
            color: #9ece6a;
            z-index: 1;
            pointer-events: none;
            overflow-y: hidden; /* Scrolled via textarea */
        }

        .status-info {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: #565f89;
            z-index: 10;
            background: rgba(26, 27, 38, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
        }

        label { font-size: 14px; color: #565f89; }
    </style>
</head>
<body>
    <div class="header">
        <label>TITLE:</label>
        <input type="text" id="titleInput" class="title-input" placeholder="KanBan 看板" value="KanBan 看板">
    </div>
    <div class="editor-container">
        <div id="backdrop"></div>
        <textarea id="statusInput" placeholder="Type status message here..."></textarea>
        <div class="status-info">SIGNALR: <span id="syncStatus">DISCONNECTED</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        const statusInput = document.getElementById("statusInput");
        const backdrop = document.getElementById("backdrop");
        const titleInput = document.getElementById("titleInput");
        const syncStatus = document.getElementById("syncStatus");
        const draftStorageKey = "ytlivechat-terminalstatus-draft";
        const tabId = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        const lockRenewIntervalMs = 1500;
        let titleBackdrop = null;
        let hasReceivedInitialStatus = false;
        let hasReceivedInitialTitle = false;
        let isApplyingRemoteState = false;
        let lockRenewTimer = null;
        let lockReleaseTimer = null;
        let connection = null;
        let lastSentStatus = "";
        let lastSentCursorPosition = 0;
        let lastSentSelectionStart = 0;
        let lastSentSelectionEnd = 0;
        let lastSentSelectionDirection = "none";
        let localRevision = 0;
        let activeLockOwnerTabId = null;
        let cursorSyncTimer = null;
        let isComposing = false;
        const debugEnabled = new URLSearchParams(window.location.search).has("debug");

        const colors = [
            '#7aa2f7', // blue
            '#bb9af7', // purple
            '#7dcfff', // cyan
            '#e0af68', // yellow
            '#f7768e', // red
            '#9ece6a', // green
            '#b4f9f8', // aqua
            '#ff9e64'  // orange
        ];

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderColoredContent(message) {
            const msg = message || "";
            let resultHtml = "";
            let currentLineIndex = 0;
            
            const startSpan = (idx) => `<span style="color: ${colors[idx % colors.length]}">`;
            
            resultHtml += startSpan(currentLineIndex);
            
            for (let i = 0; i < msg.length; i++) {
                const char = msg[i];
                if (char === '\n') {
                    resultHtml += `</span>\n`;
                    currentLineIndex++;
                    resultHtml += startSpan(currentLineIndex);
                } else {
                    resultHtml += escapeHtml(char);
                }
            }
            
            resultHtml += `</span>`;
            return resultHtml;
        }

        function updateBackdrop() {
            backdrop.innerHTML = renderColoredContent(statusInput.value) + (statusInput.value.endsWith('\n') ? '<br>&nbsp;' : '');
        }

        function ensureTitleBackdrop() {
            if (titleBackdrop !== null) {
                return;
            }

            const wrapper = document.createElement("div");
            wrapper.className = "title-shell";

            titleBackdrop = document.createElement("div");
            titleBackdrop.className = "title-backdrop";
            titleBackdrop.setAttribute("aria-hidden", "true");

            const parent = titleInput.parentElement;
            parent.insertBefore(wrapper, titleInput);
            wrapper.appendChild(titleBackdrop);
            wrapper.appendChild(titleInput);
        }

        function updateTitleBackdrop() {
            ensureTitleBackdrop();
            titleBackdrop.innerHTML = escapeHtml(titleInput.value || titleInput.placeholder || "") || "&nbsp;";
        }

        function clampPosition(value) {
            return Math.max(0, Math.min(Number.isInteger(value) ? value : 0, statusInput.value.length));
        }

        function normalizeSelectionDirection(direction) {
            return direction === "forward" || direction === "backward" ? direction : "none";
        }

        function nextRevision() {
            localRevision += 1;
            return localRevision;
        }

        function debugLog(eventName, details = {}) {
            if (!debugEnabled) {
                return;
            }

            console.log(`[admin-debug] ${eventName}`, {
                valueLength: statusInput.value.length,
                readOnly: statusInput.readOnly,
                localRevision,
                activeLockOwnerTabId,
                tabId,
                connectionState: connection?.state,
                ...details
            });
        }

        function getSelectionState() {
            const selectionStart = clampPosition(statusInput.selectionStart ?? 0);
            const selectionEnd = clampPosition(statusInput.selectionEnd ?? selectionStart);
            const selectionDirection = normalizeSelectionDirection(statusInput.selectionDirection);
            const cursorPosition = selectionDirection === "backward" && selectionStart !== selectionEnd
                ? selectionStart
                : selectionEnd;

            return {
                cursorPosition,
                selectionStart,
                selectionEnd,
                selectionDirection
            };
        }

        function applySelectionState(state) {
            const selectionStart = clampPosition(Number.isInteger(state?.selectionStart) ? state.selectionStart : state?.cursorPosition);
            const selectionEnd = clampPosition(Number.isInteger(state?.selectionEnd) ? state.selectionEnd : selectionStart);
            const selectionDirection = normalizeSelectionDirection(state?.selectionDirection);
            statusInput.setSelectionRange(
                Math.min(selectionStart, selectionEnd),
                Math.max(selectionStart, selectionEnd),
                selectionDirection);
        }

        function applyState(state) {
            if (!state) {
                return;
            }

            activeLockOwnerTabId = typeof state.editorTabId === "string" && state.editorTabId.length > 0
                ? state.editorTabId
                : null;

            const hasStatus = typeof state.status === "string";
            const incomingRevision = Number.isInteger(state.revision) ? state.revision : 0;
            if (hasStatus && incomingRevision < localRevision) {
                return;
            }

            if (incomingRevision > localRevision) {
                localRevision = incomingRevision;
            }

            isApplyingRemoteState = true;

            if (typeof state.title === "string") {
                titleInput.value = state.title;
                hasReceivedInitialTitle = true;
                updateTitleBackdrop();
            }

            if (typeof state.status === "string") {
                const shouldPreserveSelection = document.activeElement === statusInput && hasReceivedInitialStatus;
                const selectionState = getSelectionState();

                statusInput.value = state.status;
                const cursorPosition = Number.isInteger(state.cursorPosition)
                    ? Math.max(0, Math.min(state.cursorPosition, statusInput.value.length))
                    : statusInput.value.length;

                if (shouldPreserveSelection) {
                    applySelectionState(selectionState);
                } else {
                    applySelectionState({
                        cursorPosition,
                        selectionStart: Number.isInteger(state.selectionStart) ? state.selectionStart : cursorPosition,
                        selectionEnd: Number.isInteger(state.selectionEnd) ? state.selectionEnd : cursorPosition,
                        selectionDirection: state.selectionDirection
                    });
                }

                hasReceivedInitialStatus = true;
                updateBackdrop();
            }

            saveDraftToLocal();
            isApplyingRemoteState = false;
            applyLockUi();
            debugLog("applyState", { incomingRevision, hasStatus });
        }

        function saveDraftToLocal() {
            const selectionState = getSelectionState();
            const draft = {
                status: statusInput.value,
                cursorPosition: selectionState.cursorPosition,
                selectionStart: selectionState.selectionStart,
                selectionEnd: selectionState.selectionEnd,
                selectionDirection: selectionState.selectionDirection,
                title: titleInput.value,
                updatedAt: Date.now()
            };
            localStorage.setItem(draftStorageKey, JSON.stringify(draft));
        }

        function loadDraftFromLocal() {
            try {
                const raw = localStorage.getItem(draftStorageKey);
                if (!raw) return;

                const draft = JSON.parse(raw);
                if (typeof draft.status === "string") {
                    statusInput.value = draft.status;
                }
                if (typeof draft.title === "string" && draft.title.length > 0) {
                    titleInput.value = draft.title;
                }
                updateTitleBackdrop();

                const cursorPosition = Number.isInteger(draft.cursorPosition)
                    ? Math.max(0, Math.min(draft.cursorPosition, statusInput.value.length))
                    : statusInput.value.length;

                applySelectionState({
                    cursorPosition,
                    selectionStart: Number.isInteger(draft.selectionStart) ? draft.selectionStart : cursorPosition,
                    selectionEnd: Number.isInteger(draft.selectionEnd) ? draft.selectionEnd : cursorPosition,
                    selectionDirection: draft.selectionDirection
                });
                updateBackdrop();
            } catch (err) {
                console.error("Failed to load local draft", err);
            }
        }

        function applyLockUi() {
            const isOwnedByAnotherTab = activeLockOwnerTabId !== null && activeLockOwnerTabId !== tabId;
            const isConnected = connection?.state === "Connected";

            statusInput.readOnly = Boolean(isOwnedByAnotherTab);
            titleInput.readOnly = Boolean(isOwnedByAnotherTab);
            syncStatus.innerText = isOwnedByAnotherTab ? "LOCKED" : (isConnected ? "CONNECTED" : "OFFLINE");
            syncStatus.style.color = isOwnedByAnotherTab ? "#e0af68" : (isConnected ? "#9ece6a" : "#f7768e");
            debugLog("applyLockUi", { isOwnedByAnotherTab, isConnected });
        }

        function hasEditorFocus() {
            return document.activeElement === statusInput || document.activeElement === titleInput;
        }

        async function acquireLock() {
            if (!connection || connection.state !== "Connected") {
                applyLockUi();
                return false;
            }

            try {
                debugLog("acquireLock:before");
                await connection.invoke("ClaimLock", tabId);
                debugLog("acquireLock:after");
                return activeLockOwnerTabId === null || activeLockOwnerTabId === tabId;
            } catch (err) {
                console.error(err);
                applyLockUi();
                return false;
            }
        }

        function renewLock() {
            if (!connection || connection.state !== "Connected") {
                return;
            }

            debugLog("renewLock");
            connection.invoke("RenewLock", tabId).catch(err => console.error(err));
        }

        function releaseLock() {
            if (activeLockOwnerTabId === tabId) {
                activeLockOwnerTabId = null;
            }

            if (!connection || connection.state !== "Connected") {
                applyLockUi();
                return;
            }

            debugLog("releaseLock");
            connection.invoke("ReleaseLock", tabId).catch(err => console.error(err));
        }

        function clearPendingLockRelease() {
            if (lockReleaseTimer !== null) {
                clearTimeout(lockReleaseTimer);
                lockReleaseTimer = null;
            }
        }

        function scheduleLockRelease() {
            clearPendingLockRelease();
            lockReleaseTimer = setTimeout(() => {
                lockReleaseTimer = null;
                if (hasEditorFocus()) {
                    return;
                }

                stopLockRenewal();
                releaseLock();
            }, 0);
        }

        function startLockRenewal() {
            if (lockRenewTimer !== null) return;
            lockRenewTimer = setInterval(renewLock, lockRenewIntervalMs);
        }

        function stopLockRenewal() {
            if (lockRenewTimer !== null) {
                clearInterval(lockRenewTimer);
                lockRenewTimer = null;
            }
        }

        async function start() {
            try {
                const response = await fetch("/api/status", { cache: "no-store" });
                if (response.ok) {
                    applyState(await response.json());
                }

                if (!window.signalR) {
                    console.warn("SignalR client script was not loaded. Initial state is available, but realtime sync is disabled.");
                    applyLockUi();
                    return;
                }

                connection = new signalR.HubConnectionBuilder()
                    .withUrl("/statusHub")
                    .withAutomaticReconnect()
                    .build();

                connection.onclose(() => {
                    activeLockOwnerTabId = null;
                    applyLockUi();
                    debugLog("connection:onclose");
                });

                connection.on("ReceiveStatus", (message, cursorPosition, selectionStart, selectionEnd, selectionDirection, revision) => {
                    debugLog("ReceiveStatus", { revision, cursorPosition, selectionStart, selectionEnd, selectionDirection });
                    applyState({
                        title: titleInput.value,
                        status: message,
                        cursorPosition,
                        selectionStart,
                        selectionEnd,
                        selectionDirection,
                        revision
                    });
                });

                connection.on("ReceiveTitle", (title) => {
                    debugLog("ReceiveTitle", { title });
                    const selectionState = getSelectionState();
                    applyState({
                        title,
                        status: statusInput.value,
                        cursorPosition: selectionState.cursorPosition,
                        selectionStart: selectionState.selectionStart,
                        selectionEnd: selectionState.selectionEnd,
                        selectionDirection: selectionState.selectionDirection,
                        revision: localRevision
                    });
                });

                connection.on("ReceiveLock", (editorTabId, editorLockExpiresAt) => {
                    activeLockOwnerTabId = typeof editorTabId === "string" && editorTabId.length > 0
                        ? editorTabId
                        : null;
                    debugLog("ReceiveLock", { editorTabId, editorLockExpiresAt });
                    applyLockUi();
                });

                await connection.start();
                debugLog("connection:started");
                if (hasEditorFocus()) {
                    if (await acquireLock()) {
                        startLockRenewal();
                    }
                }
                applyLockUi();
            } catch (err) {
                console.error(err);
                setTimeout(start, 5000);
            }
        };

        function sync() {
            debugLog("sync:enter", { isApplyingRemoteState, hasReceivedInitialStatus, isComposing });
            if (isApplyingRemoteState || !hasReceivedInitialStatus || statusInput.readOnly) {
                saveDraftToLocal();
                return;
            }

            saveDraftToLocal();
            updateBackdrop();
            if (isComposing) {
                return;
            }
            const selectionState = getSelectionState();
            clearTimeout(cursorSyncTimer);
            lastSentStatus = statusInput.value;
            lastSentCursorPosition = selectionState.cursorPosition;
            lastSentSelectionStart = selectionState.selectionStart;
            lastSentSelectionEnd = selectionState.selectionEnd;
            lastSentSelectionDirection = selectionState.selectionDirection;
            const revision = nextRevision();
            if (!connection || connection.state !== "Connected") {
                return;
            }

            debugLog("sync:invoke", { revision, value: statusInput.value });
            connection.invoke(
                "UpdateStatus",
                lastSentStatus,
                lastSentCursorPosition,
                lastSentSelectionStart,
                lastSentSelectionEnd,
                lastSentSelectionDirection,
                revision,
                tabId)
                .catch(err => console.error(err));
        }

        function saveSelectionOnly() {
            debugLog("saveSelectionOnly", { isApplyingRemoteState, isComposing });
            if (isApplyingRemoteState || statusInput.readOnly || isComposing) {
                return;
            }

            saveDraftToLocal();
            updateBackdrop();

            syncCursorPosition();
        }

        function syncCursorPosition() {
            if (!hasReceivedInitialStatus || !connection || connection.state !== "Connected") {
                return;
            }

            const selectionState = getSelectionState();
            if (
                selectionState.cursorPosition === lastSentCursorPosition &&
                selectionState.selectionStart === lastSentSelectionStart &&
                selectionState.selectionEnd === lastSentSelectionEnd &&
                selectionState.selectionDirection === lastSentSelectionDirection &&
                statusInput.value === lastSentStatus) {
                return;
            }

            lastSentCursorPosition = selectionState.cursorPosition;
            lastSentSelectionStart = selectionState.selectionStart;
            lastSentSelectionEnd = selectionState.selectionEnd;
            lastSentSelectionDirection = selectionState.selectionDirection;
            const revision = nextRevision();
            clearTimeout(cursorSyncTimer);
            cursorSyncTimer = setTimeout(() => {
                debugLog("syncCursorPosition:invoke", { revision, selectionState });
                connection.invoke(
                    "UpdateCursor",
                    selectionState.cursorPosition,
                    selectionState.selectionStart,
                    selectionState.selectionEnd,
                    selectionState.selectionDirection,
                    revision,
                    tabId)
                    .catch(err => console.error(err));
            }, 30);
        }

        statusInput.addEventListener("input", sync);
        statusInput.addEventListener("beforeinput", (event) => {
            debugLog("beforeinput", { inputType: event.inputType, data: event.data });
        });
        statusInput.addEventListener("change", sync);
        statusInput.addEventListener("keydown", (event) => {
            debugLog("keydown", { key: event.key });
        });
        statusInput.addEventListener("keyup", saveSelectionOnly);
        statusInput.addEventListener("click", saveSelectionOnly);
        statusInput.addEventListener("select", saveSelectionOnly);
        statusInput.addEventListener("mouseup", saveSelectionOnly);
        statusInput.addEventListener("compositionstart", () => {
            isComposing = true;
        });
        statusInput.addEventListener("compositionend", () => {
            isComposing = false;
            sync();
            saveSelectionOnly();
        });
        statusInput.addEventListener("scroll", () => {
            backdrop.scrollTop = statusInput.scrollTop;
        });
        document.addEventListener("selectionchange", () => {
            if (document.activeElement === statusInput) {
                saveSelectionOnly();
            }
        });

        titleInput.addEventListener("input", () => {
            if (titleInput.readOnly) {
                return;
            }

            saveDraftToLocal();
            if (connection && connection.state === "Connected") {
                connection.invoke("UpdateTitle", titleInput.value, tabId).catch(err => console.error(err));
            }
            updateTitleBackdrop();
        });

        statusInput.addEventListener("focus", async () => {
            clearPendingLockRelease();
            if (await acquireLock()) {
                startLockRenewal();
            }
        });

        titleInput.addEventListener("focus", async () => {
            clearPendingLockRelease();
            if (await acquireLock()) {
                startLockRenewal();
            }
        });

        statusInput.addEventListener("blur", () => {
            scheduleLockRelease();
        });

        titleInput.addEventListener("blur", () => {
            scheduleLockRelease();
        });

        window.addEventListener("storage", (event) => {
            if (event.key === draftStorageKey && event.newValue && document.activeElement !== statusInput && document.activeElement !== titleInput) {
                loadDraftFromLocal();
            }
        });

        window.addEventListener("beforeunload", () => {
            saveDraftToLocal();
            clearPendingLockRelease();
            stopLockRenewal();
            releaseLock();
        });

        ensureTitleBackdrop();
        loadDraftFromLocal();
        updateTitleBackdrop();
        applyLockUi();
        start();
    </script>
</body>
</html>
