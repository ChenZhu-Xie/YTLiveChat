<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Status Overlay</title>
    <style>
        @font-face {
            font-family: 'Inconsolata';
            src: url('./Inconsolata-LXGWMono-Medium.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --ui-scale: 1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Inconsolata', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            /* OBS 高清优化 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
        }

        .terminal {
            background: rgba(26, 27, 38, 0.86);
            border: calc(1px * var(--ui-scale)) solid rgba(255, 255, 255, 0.22);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: rgba(36, 40, 59, 0.94);
            /* 进一步压缩高度：上下 padding 从 12px 减为 6px */
            padding: calc(6px * var(--ui-scale)) calc(15px * var(--ui-scale));
            display: flex;
            align-items: center;
            border-bottom: calc(1px * var(--ui-scale)) solid rgba(255, 255, 255, 0.16);
        }

        .dots {
            display: flex;
            gap: calc(6px * var(--ui-scale));
            margin-right: calc(15px * var(--ui-scale));
        }

        .dot {
            width: calc(10px * var(--ui-scale));
            height: calc(10px * var(--ui-scale));
            border-radius: 50%;
        }

        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .title-text {
            font-size: calc(24px * var(--ui-scale));
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
            margin-right: calc(31px * var(--ui-scale));
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #title {
            background: linear-gradient(to right, #4a95e3, #c16781);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content {
            /* 极大压缩边距：padding 从 30px 减为 10px (上) 和 12px (左) */
            padding: calc(10px * var(--ui-scale)) calc(12px * var(--ui-scale));
            color: #9ece6a; 
            font-size: calc(22px * var(--ui-scale));
            line-height: 1.4; /* 稍微压缩行高，允许更多行 */
            white-space: pre-wrap;
            flex-grow: 1;
            overflow: hidden;
            /* 确保首字符贴近左上角 */
            text-align: left; 
            /* 强制换行优化 */
            overflow-wrap: break-word;
            word-break: break-all; /* 使用 break-all 确保 URL 也能在任意处断开 */
        }

        .cursor {
            background: #9ece6a; 
            color: #1a1b26;
            animation: blink 1s infinite;
            display: inline; /* 关键：改为 inline 避免破坏换行 */
            padding: calc(1px * var(--ui-scale)) 0;
        }

        .selection {
            background: rgba(158, 206, 106, 0.28);
            color: #d7ffb5;
        }

        .selection-cursor {
            display: inline-block;
            width: calc(2px * var(--ui-scale));
            height: 1em;
            margin: 0 calc(-1px * var(--ui-scale));
            vertical-align: -0.14em;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="title-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title-text"><span id="title">KanBan 看板</span></div>
        </div>
        <div id="content" class="content">Initializing...<span class="cursor"></span></div>
    </div>

    <script>
        const designWidth = 291;
        const designHeight = 159;
        const signalRScriptUrl = "https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js";

        function updateUiScale() {
            const widthScale = window.innerWidth / designWidth;
            const heightScale = window.innerHeight / designHeight;
            const scale = Math.max(1, Math.min(widthScale, heightScale));
            document.documentElement.style.setProperty("--ui-scale", scale.toString());
        }

        updateUiScale();
        window.addEventListener("resize", updateUiScale);

        const colors = [
            '#7aa2f7', // blue
            '#bb9af7', // purple
            '#7dcfff', // cyan
            '#e0af68', // yellow
            '#f7768e', // red
            '#9ece6a', // green
            '#b4f9f8', // aqua
            '#ff9e64'  // orange
        ];

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function normalizeSelectionDirection(direction) {
            return direction === "forward" || direction === "backward" ? direction : "none";
        }

        function normalizeSelection(message, cursorPosition, selectionStart, selectionEnd, selectionDirection) {
            const length = message.length;
            const clamp = (value) => Math.max(0, Math.min(Number.isInteger(value) ? value : 0, length));
            const start = clamp(Number.isInteger(selectionStart) ? selectionStart : cursorPosition);
            const end = clamp(Number.isInteger(selectionEnd) ? selectionEnd : start);
            const normalizedStart = Math.min(start, end);
            const normalizedEnd = Math.max(start, end);
            const direction = normalizeSelectionDirection(selectionDirection);
            const cursor = clamp(Number.isInteger(cursorPosition)
                ? cursorPosition
                : direction === "backward" && normalizedStart !== normalizedEnd
                    ? normalizedStart
                    : normalizedEnd);

            return {
                cursorPosition: cursor,
                selectionStart: normalizedStart,
                selectionEnd: normalizedEnd,
                hasSelection: normalizedStart !== normalizedEnd
            };
        }

        function renderColoredContent(message, cursorPosition, selectionStart, selectionEnd, selectionDirection) {
            const msg = message || "";
            const selection = normalizeSelection(msg, cursorPosition, selectionStart, selectionEnd, selectionDirection);
            let resultHtml = "";
            let currentLineIndex = 0;
            
            const startSpan = (idx) => `<span style="color: ${colors[idx % colors.length]}">`;
            const selectionCursor = (idx) => {
                const color = colors[idx % colors.length];
                return `<span class="selection-cursor" style="background: ${color};"></span>`;
            };
            
            resultHtml += startSpan(currentLineIndex);
            
            for (let i = 0; i <= msg.length; i++) {
                if (selection.hasSelection && (i === selection.selectionStart || i === selection.selectionEnd)) {
                    resultHtml += selectionCursor(currentLineIndex);
                }

                if (!selection.hasSelection && i === selection.cursorPosition) {
                    const color = colors[currentLineIndex % colors.length];
                    const charAtCursor = msg[i] || " ";
                    if (charAtCursor === '\n') {
                        resultHtml += `<span class="cursor" style="background: ${color}; color: #1a1b26;">&nbsp;</span>`;
                    } else {
                        resultHtml += `<span class="cursor" style="background: ${color}; color: #1a1b26;">${escapeHtml(charAtCursor)}</span>`;
                        continue; // Skip the character we just rendered as cursor
                    }
                }
                
                if (i < msg.length) {
                    const char = msg[i];
                    if (char === '\n') {
                        resultHtml += `</span>\n`;
                        currentLineIndex++;
                        resultHtml += startSpan(currentLineIndex);
                    } else {
                        const escapedChar = escapeHtml(char);
                        resultHtml += selection.hasSelection && i >= selection.selectionStart && i < selection.selectionEnd
                            ? `<span class="selection">${escapedChar}</span>`
                            : escapedChar;
                    }
                }
            }
            
            resultHtml += `</span>`;
            return resultHtml;
        }

        function applyStatus(message, cursorPosition, selectionStart, selectionEnd, selectionDirection) {
            const contentDiv = document.getElementById("content");
            contentDiv.innerHTML = renderColoredContent(message, cursorPosition, selectionStart, selectionEnd, selectionDirection);
        }

        function applyTitle(title) {
            document.getElementById("title").innerText = title;
        }

        async function loadInitialStatus() {
            try {
                const response = await fetch("/api/status", { cache: "no-store" });
                if (!response.ok) {
                    return;
                }

                const state = await response.json();
                applyTitle(state.title || "");
                applyStatus(
                    state.status || "",
                    Number.isInteger(state.cursorPosition) ? state.cursorPosition : 0,
                    Number.isInteger(state.selectionStart) ? state.selectionStart : state.cursorPosition,
                    Number.isInteger(state.selectionEnd) ? state.selectionEnd : state.cursorPosition,
                    state.selectionDirection || "none");
            } catch (err) {
                console.error("Failed to load initial status", err);
            }
        }

        function loadSignalRClient() {
            return new Promise((resolve, reject) => {
                if (window.signalR) {
                    resolve();
                    return;
                }

                const script = document.createElement("script");
                script.src = signalRScriptUrl;
                script.onload = resolve;
                script.onerror = () => reject(new Error("SignalR client script failed to load."));
                document.head.appendChild(script);
            });
        }

        async function startRealtimeConnection() {
            try {
                await loadSignalRClient();

                const connection = new signalR.HubConnectionBuilder()
                    .withUrl("/statusHub")
                    .withAutomaticReconnect()
                    .build();

                connection.on("ReceiveStatus", (message, cursorPosition, selectionStart, selectionEnd, selectionDirection) => {
                    applyStatus(message, cursorPosition, selectionStart, selectionEnd, selectionDirection);
                });

                connection.on("ReceiveTitle", applyTitle);

                await connection.start();
            } catch (err) {
                console.error(err);
                setTimeout(startRealtimeConnection, 5000);
            }
        }

        loadInitialStatus();
        startRealtimeConnection();
    </script>
</body>
</html>
